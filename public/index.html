<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Portal Proyek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
    <link rel="stylesheet" href="ui.css?v=4" />
  </head>
  <body class="bg-slate-50">
    <div class="flex h-screen w-full">
      <div
        class="hidden lg:flex w-1/2 bg-slate-900 relative items-center justify-center overflow-hidden"
      >
        <div
          class="absolute inset-0 bg-gradient-to-br from-blue-900/90 to-slate-900/90 z-10"
        ></div>
        <img
          src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=2000&auto=format&fit=crop"
          class="absolute inset-0 w-full h-full object-cover"
          alt="Construction Site"
        />

        <div class="relative z-20 text-white p-12 max-w-lg">
          <div
            class="w-12 h-12 bg-blue-600 rounded-lg flex items-center justify-center text-white mb-6 shadow-lg shadow-blue-900/50"
          >
            <i class="fas fa-building text-2xl"></i>
          </div>
          <h1 class="text-4xl font-bold mb-4 tracking-tight">
            Elsadai Project Monitoring System
          </h1>
          <p class="text-blue-100 text-lg leading-relaxed opacity-90">
            welcome to the Elsadai Project Monitoring System.
          </p>
        </div>
      </div>

      <div
        class="w-full lg:w-1/2 flex items-center justify-center p-6 bg-white"
      >
        <div class="w-full max-w-md">
          <div class="text-center mb-8">
            <div
              class="lg:hidden w-12 h-12 bg-blue-600 rounded-lg flex items-center justify-center text-white mx-auto mb-4 shadow-lg"
            >
              <i class="fas fa-building text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Selamat Datang</h2>
            <p class="text-slate-500 text-sm mt-1">
              Silahkan masuk untuk melanjutkan.
            </p>
          </div>

          <form id="loginForm" class="space-y-5">
            <div>
              <label
                class="block text-xs font-bold text-slate-600 uppercase mb-2"
                >Email</label
              >
              <div class="relative">
                <i
                  class="fas fa-envelope absolute left-3 top-3.5 text-slate-400 text-sm"
                ></i>
                <input
                  type="email"
                  id="email"
                  required
                  class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition text-sm text-slate-800"
                  placeholder="nama@perusahaan.com"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-xs font-bold text-slate-600 uppercase mb-2"
                >Password</label
              >
              <div class="relative">
                <i
                  class="fas fa-lock absolute left-3 top-3.5 text-slate-400 text-sm"
                ></i>
                <input
                  type="password"
                  id="password"
                  required
                  class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition text-sm text-slate-800"
                  placeholder="••••••••"
                />
              </div>
            </div>

            <button
              type="submit"
              id="loginBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-blue-200 transition transform active:scale-95 flex items-center justify-center gap-2"
            >
              <span>Masuk Portal</span>
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>

          <p class="mt-8 text-center text-xs text-slate-400">
            &copy; 2026 Elsadai Servo Cons.
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import { collection, doc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      import { auth, db } from "./firebase-config.js";

      const loginForm = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");

      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        // Loading State
        loginBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Memproses...';
        loginBtn.disabled = true;
        loginBtn.classList.add("opacity-70");

        signInWithEmailAndPassword(auth, email, password)
          .then(async (userCredential) => {
            let userData = null;
            try {
              const userDoc = await getDoc(doc(db, "users", userCredential.user.uid));
              if (userDoc.exists()) userData = userDoc.data();
            } catch (err) {}
            if (!userData && userCredential.user.email) {
              try {
                const userDocByEmail = await getDoc(doc(db, "users", userCredential.user.email));
                if (userDocByEmail.exists()) userData = userDocByEmail.data();
              } catch (err) {}
            }
            if (!userData && userCredential.user.email) {
              try {
                const q = query(collection(db, "users"), where("email", "==", userCredential.user.email));
                const snap = await getDocs(q);
                if (!snap.empty) userData = snap.docs[0].data();
              } catch (err) {}
            }
            if (userData && (userData.active === false || userData.status === "inactive")) {
              await signOut(auth);
              alert("Akun Anda sedang nonaktif. Hubungi administrator.");
              throw new Error("inactive-user");
            }

            loginBtn.innerHTML = '<i class="fas fa-check"></i> Berhasil!';
            loginBtn.classList.replace("bg-blue-600", "bg-green-600");
            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 800);
          })
          .catch((error) => {
            console.error(error);
            if (error?.message !== "inactive-user") {
              alert("Login Gagal: Periksa email dan password Anda.");
            }
            // Reset Button
            loginBtn.innerHTML =
              '<span>Masuk Portal</span><i class="fas fa-arrow-right"></i>';
            loginBtn.disabled = false;
            loginBtn.classList.remove("opacity-70");
            loginBtn.classList.replace("bg-green-600", "bg-blue-600");
          });
      });
    </script>
  </body>
</html>
